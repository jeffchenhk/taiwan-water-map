<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>台湾水务设施分布图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #080f0d;
  font-family: 'Georgia', serif;
  color: #cdd8cd;
  overflow: hidden;
}

#map {
  width: 100vw;
  height: 100vh;
}

/* ── Header ── */
.hdr {
  position: fixed;
  top: 0; left: 0;
  z-index: 1000;
  padding: 28px 36px;
  pointer-events: none;
}
.hdr h1 {
  font-size: 26px;
  font-weight: 300;
  letter-spacing: 0.35em;
  color: #e2ede2;
  text-transform: uppercase;
}
.hdr p {
  font-size: 10px;
  letter-spacing: 0.25em;
  color: #4a8a6a;
  margin-top: 5px;
  text-transform: uppercase;
}

/* ── Count chip ── */
.count-chip {
  position: fixed;
  top: 32px; right: 36px;
  z-index: 1000;
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #4ecca3;
  border: 1px solid rgba(78,204,163,0.3);
  padding: 6px 14px;
  pointer-events: none;
}

/* ── Info Card ── */
#card {
  position: fixed;
  top: 50%;
  right: -440px;
  transform: translateY(-50%);
  z-index: 1000;
  width: 400px;
  max-height: 90vh;
  overflow-y: auto;
  background: rgba(8, 15, 13, 0.94);
  border: 1px solid rgba(78,204,163,0.18);
  border-right: none;
  backdrop-filter: blur(24px);
  transition: right 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  scrollbar-width: thin;
  scrollbar-color: rgba(78,204,163,0.2) transparent;
}
#card.open { right: 0; }

#card::-webkit-scrollbar { width: 3px; }
#card::-webkit-scrollbar-thumb { background: rgba(78,204,163,0.25); }

.card-inner { padding: 36px 32px 40px; }

.card-close {
  position: absolute;
  top: 18px; right: 18px;
  width: 26px; height: 26px;
  cursor: pointer;
  color: #4a8a6a;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(74,138,106,0.35);
  border-radius: 50%;
  transition: all 0.2s;
  background: transparent;
}
.card-close:hover { color: #4ecca3; border-color: #4ecca3; }

.c-eyebrow {
  font-size: 9px;
  letter-spacing: 0.35em;
  color: #4ecca3;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.c-name {
  font-size: 21px;
  font-weight: 300;
  color: #e2ede2;
  letter-spacing: 0.06em;
  line-height: 1.3;
  margin-bottom: 14px;
}
.c-badges {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 26px;
}
.badge {
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 3px 11px;
  border-radius: 20px;
}
.b-active   { background: rgba(78,204,163,0.12); color: #4ecca3; border: 1px solid rgba(78,204,163,0.35); }
.b-build    { background: rgba(232,193,109,0.12); color: #e8c16d; border: 1px solid rgba(232,193,109,0.35); }
.b-plan     { background: rgba(147,197,253,0.12); color: #93c5fd; border: 1px solid rgba(147,197,253,0.35); }
.b-reno     { background: rgba(251,146,60,0.12);  color: #fb923c; border: 1px solid rgba(251,146,60,0.35); }
.b-trial    { background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.35); }
.b-bid      { background: rgba(232,193,109,0.12); color: #e8c16d; border: 1px solid rgba(232,193,109,0.35); }

.divider {
  border: none;
  border-top: 1px solid rgba(78,204,163,0.1);
  margin: 22px 0;
}
.sec-label {
  font-size: 9px;
  letter-spacing: 0.35em;
  color: #3d8060;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.kv-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 6px;
}
.kv { }
.kv label {
  display: block;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: #3d8060;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.kv span {
  font-size: 13px;
  color: #b8d4b8;
}
.kv.full { grid-column: span 2; }

.process-box {
  background: rgba(78,204,163,0.05);
  border: 1px solid rgba(78,204,163,0.1);
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 12px;
  color: #a8c8a8;
  line-height: 1.6;
}

.mem-block {
  background: rgba(78,204,163,0.04);
  border: 1px solid rgba(78,204,163,0.12);
  border-radius: 6px;
  padding: 14px 16px;
}
.mem-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 7px 0;
  border-bottom: 1px solid rgba(78,204,163,0.07);
}
.mem-row:last-child { border-bottom: none; }
.mem-row .ml { font-size: 9px; letter-spacing: 0.15em; color: #3d8060; text-transform: uppercase; }
.mem-row .mr { font-size: 12px; color: #b8d4b8; max-width: 60%; text-align: right; }

.no-mem {
  font-size: 11px;
  color: #3d6050;
  font-style: italic;
  padding: 8px 0;
}

.owner-row {
  display: flex; align-items: center; gap: 10px; padding-top: 2px;
}
.owner-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #4ecca3;
  flex-shrink: 0;
}
.owner-name { font-size: 12px; color: #7a9a8a; line-height: 1.4; }

/* ── Legend ── */
.legend {
  position: fixed;
  bottom: 36px; left: 36px;
  z-index: 1000;
  background: rgba(8,15,13,0.85);
  border: 1px solid rgba(78,204,163,0.14);
  backdrop-filter: blur(12px);
  padding: 16px 20px;
  pointer-events: none;
}
.legend-title {
  font-size: 9px; letter-spacing: 0.3em;
  color: #4ecca3; text-transform: uppercase;
  margin-bottom: 12px;
}
.li {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
}
.li:last-child { margin-bottom: 0; }
.li-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid;
  flex-shrink: 0;
}
.li-label { font-size: 11px; color: #7a9a8a; }

/* ── Custom Markers ── */
.mk-wrap {
  position: relative;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
}
.mk-pulse {
  position: absolute;
  width: 28px; height: 28px;
  border-radius: 50%;
  animation: pulse 3s ease-out infinite;
  pointer-events: none;
}
.mk-pulse2 {
  position: absolute;
  width: 28px; height: 28px;
  border-radius: 50%;
  animation: pulse 3s ease-out infinite 1.2s;
  pointer-events: none;
}
.mk-core {
  width: 11px; height: 11px;
  border-radius: 50%;
  border: 2px solid;
  background: rgba(8,15,13,0.75);
  position: relative; z-index: 2;
  transition: transform 0.2s, box-shadow 0.2s;
}
.mk-core:hover, .mk-core.active {
  transform: scale(1.6);
}
@keyframes pulse {
  0%   { transform: scale(0.4); opacity: 0.6; }
  100% { transform: scale(2.4); opacity: 0; }
}

/* Leaflet branding */
.leaflet-control-attribution {
  background: rgba(8,15,13,0.7) !important;
  color: #3d6050 !important;
  font-size: 9px !important;
}
.leaflet-control-attribution a { color: #4a8a6a !important; }
.leaflet-control-zoom a {
  background: rgba(8,15,13,0.85) !important;
  color: #4ecca3 !important;
  border-color: rgba(78,204,163,0.2) !important;
}
.leaflet-control-zoom a:hover {
  background: rgba(78,204,163,0.1) !important;
}
</style>
</head>
<body>

<div class="hdr">
  <h1>台湾水务</h1>
  <p>Water Infrastructure · Distribution Map</p>
</div>
<div class="count-chip">10 FACILITIES</div>

<div id="map"></div>

<div id="card">
  <div class="card-inner">
    <button class="card-close" onclick="closeCard()">✕</button>
    <div id="card-body"></div>
  </div>
</div>

<div class="legend">
  <div class="legend-title">设施类型</div>
  <div class="li"><div class="li-dot" style="border-color:#4ecca3"></div><div class="li-label">市政饮用水厂</div></div>
  <div class="li"><div class="li-dot" style="border-color:#7ec8a0"></div><div class="li-label">市政再生水厂</div></div>
  <div class="li"><div class="li-dot" style="border-color:#e8c16d"></div><div class="li-label">海水淡化厂</div></div>
</div>

<script>
const TYPE_COLOR = {
  '市政饮用水厂': '#4ecca3',
  '市政再生水厂': '#7ec8a0',
  '海水淡化厂':   '#e8c16d',
  '市政污水厂':   '#9b8ec4',

const STATUS_CLASS = {

  '施工中': 'b-build',
  '规划中': 'b-plan',
  '改造中': 'b-reno',
  '试运行': 'b-trial',
  '招标中': 'b-bid',
};

const plants = [
  {
    name: '直潭净水场',
    type: '市政饮用水厂',
    region: '新北市 新店区',
    status: '已运营',

    opYear: '—',
    process: '传统处理（混凝沉淀 + 快滤）+ AI 智能加药',
    hasMem: false,
    memType: '',
    memBrand: '',
    memModel: '',
    owner: '台北自来水事业处',
    lat: 24.958, lng: 121.549,
  },
  {
    name: '长兴净水场',
    type: '市政饮用水厂',
    region: '台北市 大安区',
    status: '已运营',
    capacity: '644,100 CMD',
    opYear: '—',
    process: '传统处理（混凝沉淀 + 快滤）',
    hasMem: false,
    memType: '',
    memBrand: '',
    memModel: '',
    owner: '台北自来水事业处',
    lat: 25.026, lng: 121.553,
  },
  {
    name: '台北民生水资源再生中心',
    type: '市政再生水厂',
    region: '台北市 松山区',
    status: '试运行',
    capacity: '40,000 CMD',
    opYear: '2024',
    process: 'MLE + MBR',
    hasMem: true,
    memType: 'MBR',
    memBrand: '需核实',
    memModel: '—',
    owner: '台北市政府卫工处',
    lat: 25.060, lng: 121.567,
  },
  {
    name: '桃园北区再生水中心',
    type: '市政再生水厂',
    region: '桃园市 芦竹区',
    status: '已运营',
    capacity: '40,000 CMD',
    opYear: '2026',
    process: 'BioNET + MBR + UF + RO',
    hasMem: true,
    memType: 'MBR · UF · RO',
    memBrand: '待定',
    memModel: '—',
    owner: '桃园市政府水务局',
    lat: 25.073, lng: 121.285,
  },
  {
    name: '高雄拷潭净水场',
    type: '市政饮用水厂',
    region: '高雄市 大寮区',
    status: '已运营',
    capacity: '225,000 CMD',
    opYear: '2007',
    process: '传统处理 + UF + LPRO',
    hasMem: true,
    memType: 'UF · RO',
    memBrand: '立升 Litree（UF）',
    memModel: '—',
    owner: '台湾自来水公司第七区管理处',
    lat: 22.600, lng: 120.395,
  },
  {
    name: '凤山再生水厂',
    type: '市政再生水厂',
    region: '高雄市 凤山区',
    status: '已运营',
    capacity: '45,000 CMD',
    opYear: '2018',
    process: '二级处理 + UF + RO',
    hasMem: true,
    memType: 'UF · RO',
    memBrand: 'Pentair（UF）/ Toray（RO）',
    memModel: 'Aqualine / Seaguard',
    owner: '高雄市政府水利局',
    lat: 22.628, lng: 120.358,
  },
  {
    name: '临海再生水厂',
    type: '市政再生水厂',
    region: '高雄市 小港区',
    status: '已运营',
    capacity: '33,000 CMD',
    opYear: '2021',
    process: '4段 AO + MBR + RO',
    hasMem: true,
    memType: 'MBR · RO',
    memBrand: '旭化成（MBR）',
    memModel: 'MUNC 系列',
    owner: '高雄市政府水利局',
    lat: 22.563, lng: 120.328,
  },
  {
    name: '永康再生水厂',
    type: '市政再生水厂',
    region: '台南市 永康区',
    status: '已运营',
    capacity: '15,500 CMD',
    opYear: '2021',
    process: '二级处理 + UF + RO',
    hasMem: true,
    memType: 'UF · RO',
    memBrand: '未查到',
    memModel: '—',
    owner: '台南市政府水利局',
    lat: 23.047, lng: 120.256,
  },
  {
    name: '福田再生水厂',
    type: '市政再生水厂',
    region: '台中市 南区',
    status: '已运营',
    capacity: '58,000 CMD',
    opYear: '2026',
    process: '二级处理 + UF + RO',
    hasMem: true,
    memType: 'UF · RO',
    memBrand: '待定',
    memModel: '—',
    owner: '台中市政府水利局',
    lat: 24.109, lng: 120.668,
  },
  {
    name: '马公第一海水淡化厂',
    type: '海水淡化厂',
    region: '澎湖县 马公市',
    status: '改造中',
    capacity: '3,000 CMD',
    opYear: '—',
    process: '前置自清洗滤网 + RO',
    hasMem: true,
    memType: 'RO · 自动清洗滤网',
    memBrand: 'Amiad（滤网）',
    memModel: '8" ABF6000',
    owner: '台湾自来水公司第七区管理处',
    lat: 23.565, lng: 119.563,
  },
];

// Map init
const map = L.map('map', {
  center: [23.6, 120.8],
  zoom: 8,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

let activeMarker = null;

function makeIcon(plant) {
  const color = TYPE_COLOR[plant.type] || '#4ecca3';
  const html = `
    <div class="mk-wrap">
      <div class="mk-pulse" style="border:1px solid ${color}55;background:${color}08"></div>
      <div class="mk-pulse2" style="border:1px solid ${color}33;background:transparent"></div>
      <div class="mk-core" style="border-color:${color};box-shadow:0 0 8px ${color}50"></div>
    </div>`;
  return L.divIcon({
    html,
    className: '',
    iconSize: [30, 30],
    iconAnchor: [15, 15],
  });
}

function statusBadge(s) {
  const cls = STATUS_CLASS[s] || 'b-active';
  return `<span class="badge ${cls}">${s}</span>`;
}

function typeBadge(t) {
  const color = TYPE_COLOR[t] || '#4ecca3';
  return `<span class="badge" style="background:${color}12;color:${color};border:1px solid ${color}40">${t}</span>`;
}

function renderCard(p) {
  const mem = p.hasMem
    ? `<div class="mem-block">
         <div class="mem-row"><span class="ml">膜技术类型</span><span class="mr">${p.memType || '—'}</span></div>
         <div class="mem-row"><span class="ml">膜品牌</span><span class="mr">${p.memBrand || '—'}</span></div>
         <div class="mem-row"><span class="ml">膜型号</span><span class="mr">${p.memModel || '—'}</span></div>
       </div>`
    : `<p class="no-mem">本项目暂未涉及膜技术</p>`;

  return `
    <div class="c-eyebrow">${p.region}</div>
    <div class="c-name">${p.name}</div>
    <div class="c-badges">${typeBadge(p.type)}${statusBadge(p.status)}</div>

    <div class="sec-label">基本信息</div>
    <div class="kv-grid">
      <div class="kv">
        <label>处理规模</label>
        <span>${p.capacity}</span>
      </div>
      <div class="kv">
        <label>投运时间</label>
        <span>${p.opYear}</span>
      </div>
      <div class="kv full">
        <label>业主单位</label>
        <div class="owner-row">
          <div class="owner-dot"></div>
          <div class="owner-name">${p.owner}</div>
        </div>
      </div>
    </div>

    <hr class="divider">
    <div class="sec-label">工艺路线</div>
    <div class="process-box">${p.process}</div>

    <hr class="divider">
    <div class="sec-label">膜技术应用</div>
    ${mem}
  `;
}

function closeCard() {
  document.getElementById('card').classList.remove('open');
  if (activeMarker) {
    const core = activeMarker.getElement()?.querySelector('.mk-core');
    if (core) core.classList.remove('active');
    activeMarker = null;
  }
}

plants.forEach(p => {
  const marker = L.marker([p.lat, p.lng], { icon: makeIcon(p) }).addTo(map);

  marker.on('click', () => {
    if (activeMarker && activeMarker !== marker) {
      const prevCore = activeMarker.getElement()?.querySelector('.mk-core');
      if (prevCore) prevCore.classList.remove('active');
    }
    activeMarker = marker;
    const core = marker.getElement()?.querySelector('.mk-core');
    if (core) core.classList.add('active');

    document.getElementById('card-body').innerHTML = renderCard(p);
    document.getElementById('card').classList.add('open');

    map.panTo([p.lat, p.lng], { animate: true, duration: 0.6 });
  });
});

map.on('click', e => {
  if (e.originalEvent.target === map.getContainer() ||
      e.originalEvent.target.tagName === 'CANVAS') {
    closeCard();
  }
});
</script>
</body>
</html>
