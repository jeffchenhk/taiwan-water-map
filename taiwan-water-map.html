.kv label{display:block;font-size:8px;letter-spacing:.2em;color:#2d6045;text-transform:uppercase;margin-bottom:3px}
.kv span{font-size:12px;color:#a8c8a8;line-height:1.5}

.mem-r:last-child{border-bottom:none}
.mem-r .ml{font-size:8px;letter-spacing:.15em;color:#2d6045;text-transform:uppercase}
.mem-r .mr{font-size:11px;color:#a8c8a8;max-width:65%;text-align:right}
.mem-r .mr.wide{max-width:100%;text-align:left;color:#9ab8a0;line-height:1.5;font-size:11px}
.coll-btn{width:100%;text-align:left;font-size:9px;letter-spacing:.25em;color:#3d8060;text-transform:uppercase;background:transparent;border:none;border-top:1px solid rgba(78,204,163,.1);padding:8px 0;cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;align-items:center}

.coll-content{display:none}
.coll-content.open{display:block}
.opp-blk{background:rgba(232,193,109,.04);border:1px solid rgba(232,193,109,.12);border-radius:4px;padding:12px 14px}
.opp-r{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid rgba(232,193,109,.07)}
.opp-r:last-child{border-bottom:none}
.opp-r .ol{font-size:8px;letter-spacing:.15em;color:#7a6030;text-transform:uppercase}
.opp-r .or{font-size:11px;color:#c8a860;max-width:65%;text-align:right}
.opp-r .or.wide{max-width:100%;text-align:left;color:#b09858;line-height:1.5;font-size:11px}
.warn-box{background:rgba(232,193,109,.05);border:1px solid rgba(232,193,109,.2);border-radius:3px;padding:8px 12px;font-size:11px;color:#b09050;line-height:1.6}

.card-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.btn-o{font-size:9px;letter-spacing:.15em;padding:9px 0;text-align:center;border:1px solid rgba(78,204,163,.25);color:#4a8a6a;cursor:pointer;background:transparent;font-family:inherit;border-radius:2px;transition:all .2s}
.btn-o:hover{border-color:#4ecca3;color:#4ecca3;background:rgba(78,204,163,.05)}
.btn-s{font-size:9px;letter-spacing:.15em;padding:9px 0;text-align:center;border:1px solid rgba(78,204,163,.45);color:#4ecca3;cursor:pointer;background:rgba(78,204,163,.08);font-family:inherit;border-radius:2px;transition:all .2s}

.legend{position:fixed;bottom:24px;left:18px;z-index:800;background:rgba(8,15,13,.88);border:1px solid rgba(78,204,163,.13);backdrop-filter:blur(10px);padding:12px 16px;pointer-events:none}

.mk{position:relative;display:flex;align-items:center;justify-content:center}

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

function mkIcon(p){
  const c=LV_CLR[p.oppLevel]||'#5a8a7a';
  const sz=LV_SZ[p.oppLevel]||10;
  const noPulse=(p.oppLevel==='C'||p.oppLevel==='待判断');
  const pulse=noPulse?'':
    `<div class="mk-p" style="width:${sz*3}px;height:${sz*3}px;border:1px solid ${c}44;background:${c}08;margin-left:-${sz*1.5-sz/2}px;margin-top:-${sz*1.5-sz/2}px"></div>`+
    `<div class="mk-p2" style="width:${sz*3}px;height:${sz*3}px;border:1px solid ${c}22;margin-left:-${sz*1.5-sz/2}px;margin-top:-${sz*1.5-sz/2}px"></div>`;
  const wSz=sz*3;
  return L.divIcon({
    html:`<div class="mk" style="width:${wSz}px;height:${wSz}px">${pulse}<div class="mk-c" style="width:${sz}px;height:${sz}px;border-color:${c};box-shadow:0 0 ${sz}px ${c}60"></div></div>`,
    className:'',iconSize:[wSz,wSz],iconAnchor:[wSz/2,wSz/2]
  });
}

// Populate province/city/service/effluent/influent filters
function unique(arr){return[...new Set(arr.filter(x=>x&&x!=='—'))].sort()}
const provF=document.getElementById('provF');
unique(PLANTS.map(p=>p.province)).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;provF.appendChild(o)});
const cityF=document.getElementById('cityF');
unique(PLANTS.map(p=>p.city)).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;cityF.appendChild(o)});
const svcF=document.getElementById('svcF');
unique(PLANTS.flatMap(p=>p.serviceTarget.split(';'))).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;svcF.appendChild(o)});
const efflF=document.getElementById('efflF');
unique(PLANTS.flatMap(p=>p.effluent.split(';'))).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;efflF.appendChild(o)});
const inflF=document.getElementById('inflF');
unique(PLANTS.flatMap(p=>p.influentType.split(';'))).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;inflF.appendChild(o)});

// Markers
let activeMarker=null;
const MKS=PLANTS.map((p,i)=>{
  if(!p.lat||!p.lng)return null;
  const m=L.marker([p.lat,p.lng],{icon:mkIcon(p)}).addTo(map);
  m.on('click',()=>openCard(p,m));
  return{marker:m,plant:p};
}).filter(Boolean);

// Filters
const activeLvl=new Set(['S','A','B','C','待判断']);
document.querySelectorAll('.lc').forEach(c=>{
  c.addEventListener('click',()=>{
    const lv=c.dataset.lv;
    if(activeLvl.has(lv)){activeLvl.delete(lv);c.classList.remove('on')}
    else{activeLvl.add(lv);c.classList.add('on')}
    applyF();
  });
});

const advBtn=document.getElementById('advBtn');
const advPanel=document.getElementById('adv-panel');
advBtn.addEventListener('click',()=>{
  const on=advPanel.classList.toggle('open');
  advBtn.classList.toggle('on',on);
  advBtn.textContent=on?'高级筛选 ▴':'高级筛选 ▾';
});

['SI','typeF','provF','statusF','memF','cityF','islandF','memTypeF','svcF','efflF','inflF','credF','oppTypeF','stageF'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener(el.tagName==='INPUT'?'input':'change',applyF);
});

function applyF(){
  const q=document.getElementById('SI').value.toLowerCase();
  const ty=document.getElementById('typeF').value;
  const pv=document.getElementById('provF').value;
  const st=document.getElementById('statusF').value;
  const mm=document.getElementById('memF').value;
  const ci=document.getElementById('cityF').value;
  const il=document.getElementById('islandF').value;
  const mt=document.getElementById('memTypeF').value;
  const sv=document.getElementById('svcF').value;
  const ef=document.getElementById('efflF').value;
  const in_=document.getElementById('inflF').value;
  const cr=document.getElementById('credF').value;
  const ot=document.getElementById('oppTypeF').value;
  const sg=document.getElementById('stageF').value;
  let n=0;
  MKS.forEach(({marker,plant:p})=>{
    let ok=true;
    if(q&&![p.name,p.owner,p.province,p.city,p.location].join(' ').toLowerCase().includes(q))ok=false;
    if(ty&&p.type!==ty)ok=false;
    if(pv&&p.province!==pv)ok=false;
    if(st&&p.status!==st)ok=false;
    if(mm&&p.hasMem!==mm)ok=false;
    if(ci&&p.city!==ci)ok=false;
    if(il&&p.isIsland!==il)ok=false;
    if(mt&&!p.memType.includes(mt))ok=false;
    if(sv&&!p.serviceTarget.includes(sv))ok=false;
    if(ef&&!p.effluent.includes(ef))ok=false;
    if(in_&&!p.influentType.includes(in_))ok=false;
    if(cr&&p.credibility!==cr)ok=false;
    if(ot&&p.oppType!==ot)ok=false;
    if(sg&&p.followStage!==sg)ok=false;
    if(activeLvl.size>0&&!activeLvl.has(p.oppLevel))ok=false;
    if(ok){marker.addTo(map);n++}else{map.removeLayer(marker)}
  });
  document.getElementById('CC').textContent=`${n} 个项目`;
}

// Card
function b(cls,txt){return`<span class="badge ${cls}">${txt}</span>`}
function kv(lbl,val,full){
  if(!val||val==='—'||val==='未查到'||val==='不适用')return'';
  return`<div class="kv${full?' full':''}"><label>${lbl}</label><span>${val}</span></div>`;
}
function kvhi(lbl,val,full){
  if(!val||val==='—'||val==='未查到'||val==='不适用')return'';
  return`<div class="kv${full?' full':''}"><label>${lbl}</label><span class="hi">${val}</span></div>`;
}

function memBadge(v){
  if(v==='是')return b('b-mem-y','涉及膜技术');
  if(v==='否')return b('b-mem-n','未涉及膜技术');
  if(v==='规划采用')return b('b-mem-o','规划采用膜技术');
  if(v==='试点测试')return b('b-mem-o','试点测试');
  if(v==='潜在相关')return b('b-mem-o','潜在相关');
  return b('b-mem-n',v);
}

function memSection(p){
  const show=['是','规划采用','试点测试','潜在相关','需核实'].includes(p.hasMem);
  if(!show)return'';
  const rows=[
    p.memType!=='—'?`<div class="mem-r"><span class="ml">膜技术类型</span><span class="mr">${p.memType}</span></div>`:'',
    p.memCombined!=='—'?`<div class="mem-r"><span class="ml">是否组合膜工艺</span><span class="mr">${p.memCombined}</span></div>`:'',
    p.memEnv!=='—'?`<div class="mem-r"><span class="ml">应用环节</span><span class="mr wide">${p.memEnv}</span></div>`:'',
    p.memBrand!=='—'&&p.memBrand!=='未查到'?`<div class="mem-r"><span class="ml">已知膜品牌</span><span class="mr wide">${p.memBrand}</span></div>`:'',
    p.memSupplier!=='—'&&p.memSupplier!=='未查到'?`<div class="mem-r"><span class="ml">膜供应商</span><span class="mr">${p.memSupplier}</span></div>`:'',
    p.memModel!=='—'&&p.memModel!=='未查到'?`<div class="mem-r"><span class="ml">膜组件型号</span><span class="mr">${p.memModel}</span></div>`:'',
    p.memMaterial!=='—'&&p.memMaterial!=='未查到'?`<div class="mem-r"><span class="ml">膜材料</span><span class="mr">${p.memMaterial}</span></div>`:'',
    p.memForm!=='—'&&p.memForm!=='未查到'?`<div class="mem-r"><span class="ml">膜组件形式</span><span class="mr">${p.memForm}</span></div>`:'',
    p.memPoreSize!=='—'&&p.memPoreSize!=='未查到'?`<div class="mem-r"><span class="ml">膜孔径</span><span class="mr">${p.memPoreSize}</span></div>`:'',
    p.memOpTime!=='—'&&p.memOpTime!=='未查到'?`<div class="mem-r"><span class="ml">膜系统投运时间</span><span class="mr">${p.memOpTime}</span></div>`:'',
    p.memRunYears!=='—'&&p.memRunYears!=='未查到'?`<div class="mem-r"><span class="ml">运行年限</span><span class="mr">${p.memRunYears}</span></div>`:'',
    p.memRunStatus!=='—'&&p.memRunStatus!=='未查到'?`<div class="mem-r"><span class="ml">运行情况</span><span class="mr wide">${p.memRunStatus}</span></div>`:'',
    p.hasPilot!=='—'&&p.hasPilot!=='否'?`<div class="mem-r"><span class="ml">试验/验证项目</span><span class="mr">${p.hasPilot}</span></div>`:'',
  ].filter(Boolean).join('');
  return rows?`<div class="mem-blk">${rows}</div>`:'';
}

function renderCard(p){
  const lvCls=LV_CLS[p.oppLevel]||'b-lvW';
  const stCls=ST_CLS[p.status]||'b-active';
  const credCls=CRED_CLS[p.credibility]||'';

  // link
  let linkHtml='—';
  if(p.infoLink&&p.infoLink!=='—'&&p.infoLink.startsWith('http')){
    const disp=p.infoLink.length>45?p.infoLink.slice(0,45)+'…':p.infoLink;
    linkHtml=`<a class="src-link" href="${p.infoLink}" target="_blank" rel="noopener">${disp}</a>`;
  } else if(p.infoLink&&p.infoLink!=='—'){
    linkHtml=p.infoLink;
  }

  return `
  <!-- 摘要 -->
  <div class="c-loc">${p.province} · ${p.city}</div>
  <div class="c-name">${p.name}</div>
  ${p.nameTC&&p.nameTC!=='—'?`<div class="c-tc">${p.nameTC}</div>`:''}
  <div class="c-badges">
    <span class="badge" style="background:rgba(78,204,163,.08);color:#5aaa80;border:1px solid rgba(78,204,163,.25);font-size:9px;padding:2px 9px;border-radius:20px">${p.type}</span>
    ${b(stCls,p.status)}
    ${p.oppLevel!=='—'?b(lvCls,p.oppLevel+' 级'):''}
    ${p.oppType&&p.oppType!=='待判断'?b('badge',''+p.oppType):''}
    ${p.isIsland==='是'?b('b-island','离岛'):''}
  </div>

  <!-- 基础信息 -->
  <div class="sec">
    <div class="sec-hd">基础信息</div>
    <div class="kv-grid">
      ${kvhi('当前规模 CMD',p.capacityCMD)}
      ${kv('远期规模 CMD',p.capacityFutureCMD)}
      ${kv('投运时间',p.opTime)}
      ${kv('建设时间',p.buildTime)}
      ${kv('是否分期建设',p.phased==='是'?'是':'',false)}
      ${kv('是否离岛',p.isIsland)}
    </div>
    ${p.phased==='是'&&p.phasedNote!=='—'&&p.phasedNote!=='未查到'?`<div class="kv full"><label>分期情况说明</label><span>${p.phasedNote}</span></div>`:''}
    ${kvhi('业主单位',p.owner,true)}
    ${kv('所属系统/区处',p.district,true)}
    ${kv('主管/监管单位',p.regulator,true)}
  </div>

  <!-- 水源与用途 -->
  <div class="sec">
    <div class="sec-hd">水源与用途</div>
    <div class="kv-grid">
      ${kv('水源地/取水口',p.waterSource)}
      ${kv('原水/进水类型',p.influentType)}
      ${kv('服务对象/用水端',p.serviceTarget)}
      ${kv('出水用途',p.effluent)}
      ${kv('主要服务对象',p.serviceTargetName,true)}
      ${kv('主要水质挑战',p.waterQualityChallenge,true)}
    </div>
  </div>

  <!-- 工艺与膜技术 -->
  <div class="sec">
    <div class="sec-hd">工艺与膜技术</div>
    ${p.process!=='—'?`<div class="kv full" style="margin-bottom:10px"><label>现有工艺路线</label><div class="process-box">${p.process}</div></div>`:''}
    <div style="margin-bottom:8px">${memBadge(p.hasMem)}</div>
    ${memSection(p)}
    <div class="kv-grid" style="margin-top:8px">
      ${kv('项目投资金额',p.investment)}
      ${kv('采购/招标方式',p.procure)}
    </div>
  </div>

  <!-- 参与单位 (collapsible) -->
  <div class="sec">
    <button class="coll-btn" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'参与单位 ▴':'参与单位 ▾'">参与单位 ▾</button>
    <div class="coll-content">
      <div class="kv-grid" style="margin-top:10px">
        ${kv('业主单位',p.owner)}
        ${kv('主管/监管单位',p.regulator)}
        ${kv('EPC/统包商',p.epc)}
        ${kv('系统集成商',p.integrator)}
        ${kv('设计院/设计顾问',p.designer)}
        ${kv('运维/代操作方',p.om)}
        ${kv('BOT/PPP项目公司',p.botCo)}
        ${kv('膜供应商',p.memSupplier)}
        ${kv('其他关键参与单位',p.others,true)}
      </div>
    </div>
  </div>

  <!-- 内部作战判断 -->
  <div class="sec">
    <div class="sec-hd">内部作战判断 <span class="tag">INTERNAL</span></div>
    <div class="opp-blk">
      <div class="opp-r"><span class="ol">与立升相关性</span><span class="or">${p.relevance}</span></div>
      <div class="opp-r"><span class="ol">机会等级</span><span class="or">${p.oppLevel}</span></div>
      <div class="opp-r"><span class="ol">机会类型</span><span class="or">${p.oppType}</span></div>
      ${p.entryPoint&&p.entryPoint!=='—'?`<div class="opp-r" style="flex-direction:column;gap:4px;align-items:flex-start"><span class="ol">潜在切入点</span><span class="or wide">${p.entryPoint}</span></div>`:''}
      ${p.recommendation&&p.recommendation!=='—'?`<div class="opp-r" style="flex-direction:column;gap:4px;align-items:flex-start"><span class="ol">推荐下一步动作</span><span class="or wide">${p.recommendation}</span></div>`:''}
      <div class="opp-r"><span class="ol">负责人</span><span class="or">${p.responsiblePerson||'—'}</span></div>
      <div class="opp-r"><span class="ol">跟进阶段</span><span class="or">${p.followStage}</span></div>
      <div class="opp-r"><span class="ol">下次动作时间</span><span class="or">${p.nextAction||'—'}</span></div>
      ${p.internalNote?`<div class="opp-r" style="flex-direction:column;gap:4px;align-items:flex-start"><span class="ol">内部备注</span><span class="or wide">${p.internalNote}</span></div>`:''}
    </div>
  </div>

  <!-- 信息来源与可信度 -->
  <div class="sec">
    <div class="sec-hd">信息来源与可信度</div>
    <div class="kv-grid">
      <div class="kv"><label>信息可信度</label><span>${credCls?b(credCls,p.credibility):p.credibility}</span></div>
      ${kv('来源类型',p.sourceType)}
      ${kv('信息发布日期',p.infoDate)}
      ${kv('最后核实日期',p.lastVerified)}
    </div>
    ${kv('主要信息来源',p.infoSource,true)}
    <div class="kv full"><label>相关链接/出处</label><span>${linkHtml}</span></div>
    ${p.notes&&p.notes!=='—'&&p.notes!=='未查到'?`<div class="kv full" style="margin-top:6px"><label>备注/待核实点</label><div class="warn-box">${p.notes}</div></div>`:''}
  </div>

  <div class="card-btns">
    <button class="btn-o">查看完整档案</button>
    <button class="btn-s">新增跟进记录</button>
  </div>`;
}

function openCard(p,m){
  if(activeMarker&&activeMarker!==m)activeMarker.getElement()?.querySelector('.mk-c')?.classList.remove('act');
  activeMarker=m;
  m.getElement()?.querySelector('.mk-c')?.classList.add('act');
  document.getElementById('CB').innerHTML=renderCard(p);
  document.getElementById('card').classList.add('open');
  map.panTo([p.lat,p.lng],{animate:true,duration:.6});
}
function closeCard(){
  document.getElementById('card').classList.remove('open');
  if(activeMarker){activeMarker.getElement()?.querySelector('.mk-c')?.classList.remove('act');activeMarker=null;}
}
map.on('click',e=>{if(e.originalEvent.target.classList.contains('leaflet-container')||e.originalEvent.target.tagName==='CANVAS')closeCard();});
</script>
